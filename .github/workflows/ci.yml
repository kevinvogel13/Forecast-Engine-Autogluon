name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (engine + dev)
        run: |
          uv venv
          uv pip install pandas numpy scipy scikit-learn duckdb holidays pytest

      - name: Run pytest
        run: uv run pytest

  typescript:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check
