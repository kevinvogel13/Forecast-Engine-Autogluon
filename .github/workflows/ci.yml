name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run check

  pytest:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      # Heavy ML deps from pyproject (autogluon, torch via the index) are
      # not needed for the sandbox + storage tests and would balloon CI
      # to ~10+ minutes. Install only what the unit tests touch.
      - run: pip install pandas numpy duckdb pyarrow pytest pytest-cov
      - run: pytest tests/python -ra
